<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SHALA Browser — Ana Sayfa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at top, #241c14 0%, #15110c 55%, #0c0907 100%);
    font-family: Georgia, 'Palatino', serif;
    color: #e8d9b5;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .stage {
    width: 100%;
    max-width: 640px;
    padding: 32px 28px;
    text-align: center;
    animation: rise 0.7s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Üst hat ===== */
  .top-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
    color: #6b5d44;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .top-rule .line {
    width: 46px; height: 1px;
    background: linear-gradient(90deg, transparent, #6b5d44);
  }
  .top-rule .line.right { background: linear-gradient(90deg, #6b5d44, transparent); }


  /* ===== Başlık ===== */
  h1 {
    font-size: 27px;
    font-weight: 400;
    letter-spacing: 7px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #f3dd92, #d4af37 45%, #9c7a28);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .kingdom-sub {
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #8a7654;
    margin-bottom: 26px;
  }

  /* ===== Künye kartı ===== */
  .charter {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(212,175,55,0.14);
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .charter-cell {
    background: rgba(20,16,11,0.55);
    padding: 12px 14px;
    text-align: left;
  }
  .charter-label {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b5d44;
    margin-bottom: 4px;
  }
  .charter-value {
    font-size: 14px;
    color: #d8c594;
  }

  /* ===== CTA ===== */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 30px;
    border-radius: 30px;
    background: linear-gradient(135deg, #e8c869, #c69a2e 55%, #a8842c);
    color: #241a0c;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-decoration: none;
    box-shadow: 0 8px 22px rgba(212,175,55,0.25);
    transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease;
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(212,175,55,0.38);
  }
  .cta:active { transform: translateY(0) scale(0.98); }
  .cta svg { flex-shrink: 0; }

  .cta-url {
    margin-top: 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #6b5d44;
    letter-spacing: 0.5px;
  }

  /* ===== Bayrak ===== */
  .flag-strip {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
    filter: drop-shadow(0 8px 26px rgba(0,0,0,0.55));
  }
  .flag-strip img {
    width: 220px;
    height: auto;
    border-radius: 6px;
    border: 1px solid rgba(212,175,55,0.4);
  }

  /* ===== Hızlı bağlantılar ===== */
  .quick-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 30px;
  }
  .qlink {
    width: 64px;
    padding: 13px 6px;
    border-radius: 10px;
    background: rgba(212,175,55,0.06);
    border: 1px solid rgba(212,175,55,0.16);
    color: #b89f6c;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 10.5px;
    cursor: pointer;
    transition: all 0.22s ease;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .qlink:hover {
    background: rgba(212,175,55,0.13);
    border-color: rgba(212,175,55,0.36);
    transform: translateY(-2px);
    color: #d8c594;
  }
  .qlink svg { opacity: 0.8; }

  /* ===== Alt çizgi ===== */
  .footer-rule {
    margin-top: 26px;
    padding-top: 16px;
    border-top: 1px solid rgba(212,175,55,0.12);
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: #524634;
  }
</style>
</head>
