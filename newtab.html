<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SHALA Browser — Ana Sayfa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at top, #241c14 0%, #15110c 55%, #0c0907 100%);
    font-family: Georgia, 'Palatino', serif;
    color: #e8d9b5;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .stage {
    width: 100%;
    max-width: 640px;
    padding: 32px 28px;
    text-align: center;
    animation: rise 0.7s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Üst hat ===== */
  .top-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
    color: #6b5d44;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .top-rule .line {
    width: 46px; height: 1px;
    background: linear-gradient(90deg, transparent, #6b5d44);
  }
  .top-rule .line.right { background: linear-gradient(90deg, #6b5d44, transparent); }


  /* ===== Başlık ===== */
  h1 {
    font-size: 27px;
    font-weight: 400;
    letter-spacing: 7px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #f3dd92, #d4af37 45%, #9c7a28);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .kingdom-sub {
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #8a7654;
    margin-bottom: 26px;
  }

  /* ===== Künye kartı ===== */
  .charter {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(212,175,55,0.14);
    border: 1px solid rgba(212,175,55,0.18);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .charter-cell {
    background: rgba(20,16,11,0.55);
    padding: 12px 14px;
    text-align: left;
  }
  .charter-label {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b5d44;
    margin-bottom: 4px;
  }
  .charter-value {
    font-size: 14px;
    color: #d8c594;
  }

  /* ===== CTA ===== */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 30px;
    border-radius: 30px;
    background: linear-gradient(135deg, #e8c869, #c69a2e 55%, #a8842c);
    color: #241a0c;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-decoration: none;
    box-shadow: 0 8px 22px rgba(212,175,55,0.25);
    transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s ease;
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(212,175,55,0.38);
  }
  .cta:active { transform: translateY(0) scale(0.98); }
  .cta svg { flex-shrink: 0; }

  .cta-url {
    margin-top: 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #6b5d44;
    letter-spacing: 0.5px;
  }

  /* ===== Bayrak ===== */
  .flag-strip {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
    filter: drop-shadow(0 8px 26px rgba(0,0,0,0.55));
  }
  .flag-strip img {
    width: 220px;
    height: auto;
    border-radius: 6px;
    border: 1px solid rgba(212,175,55,0.4);
  }

  /* ===== Hızlı bağlantılar ===== */
  .quick-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 30px;
  }
  .qlink {
    width: 64px;
    padding: 13px 6px;
    border-radius: 10px;
    background: rgba(212,175,55,0.06);
    border: 1px solid rgba(212,175,55,0.16);
    color: #b89f6c;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 10.5px;
    cursor: pointer;
    transition: all 0.22s ease;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .qlink:hover {
    background: rgba(212,175,55,0.13);
    border-color: rgba(212,175,55,0.36);
    transform: translateY(-2px);
    color: #d8c594;
  }
  .qlink svg { opacity: 0.8; }

  /* ===== Alt çizgi ===== */
  .footer-rule {
    margin-top: 26px;
    padding-top: 16px;
    border-top: 1px solid rgba(212,175,55,0.12);
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: #524634;
  }
</style>
</head>
<body>
  <div class="stage">

    <div class="top-rule">
      <span class="line"></span>
      <span>Krallık Tarihi · 1000. Yıl</span>
      <span class="line right"></span>
    </div>

    <div class="flag-strip">
      <img id="flagImg" src="assets/dardania-flag.png" alt="Dardania Krallığı Resmî Bayrağı">
    </div>

    <h1>DARDANIA</h1>
    <div class="kingdom-sub">Krallığın Resmi Portalı</div>

    <div class="charter">
      <div class="charter-cell">
        <div class="charter-label">Resmî Ad</div>
        <div class="charter-value">Dardania Krallığı</div>
      </div>
      <div class="charter-cell">
        <div class="charter-label">Yönetim Biçimi</div>
        <div class="charter-value">Anayasal Monarşi</div>
      </div>
    </div>

    <a class="cta" href="https://dardania.gt.tc" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3c2.5 2.7 4 6 4 9s-1.5 6.3-4 9c-2.5-2.7-4-6-4-9s1.5-6.3 4-9z"/>
      </svg>
      Krallık Portalına Git
    </a>
    <div class="cta-url">dardania.gt.tc</div>

    <div class="quick-links">
      <a class="qlink" href="https://www.google.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        Google
      </a>
      <a class="qlink" href="https://www.wikipedia.org">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        Wikipedia
      </a>
      <a class="qlink" href="https://github.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.5c0-1 .1-1.4-.5-2 2-.2 4-1 4-4.5 0-1-.5-2-1-2.5.3-1 .3-2-.1-3 0 0-1 0-2.5 1-1.5-.4-3-.4-4.5 0-1.5-1-2.5-1-2.5-1-.4 1-.4 2-.1 3-.5.5-1 1.6-1 2.5 0 3.5 2 4.3 4 4.5-.4.4-.5 1-.5 2V19"/></svg>
        GitHub
      </a>
      <a class="qlink" href="https://shalauberallen.blogspot.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        Blog
      </a>
    </div>

    <div class="footer-rule">SHALA BROWSER · DARDANIA KINGDOM RESMİ TARAYICISI</div>
  </div>
 <script>
  const flagImg = document.getElementById('flagImg');
  // Mutlak file:// path kullan
  flagImg.src = `file://${window.location.pathname.replace(/newtab\.html.*/, '')}assets/dardania-flag.png`;
</script>
</body>
</html>
