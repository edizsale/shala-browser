<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yeni Sekme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at top, #2a2118 0%, #16120d 60%, #0e0b08 100%);
    font-family: Georgia, 'Palatino', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .wrap {
    text-align: center;
    color: #d4af37;
    animation: rise 0.6s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .crest {
    font-size: 52px;
    margin-bottom: 18px;
    text-shadow: 0 0 30px rgba(212,175,55,0.45);
    opacity: 0.9;
  }
  h1 {
    font-size: 30px;
    letter-spacing: 6px;
    font-weight: 400;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #f0d77a, #d4af37 50%, #a8842c);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub {
    font-size: 12px;
    letter-spacing: 3px;
    color: #8a7654;
    text-transform: uppercase;
  }
  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
    margin: 28px auto;
    opacity: 0.6;
  }
  .quick-links {
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .qlink {
    width: 64px;
    padding: 14px 6px;
    border-radius: 10px;
    background: rgba(212,175,55,0.06);
    border: 1px solid rgba(212,175,55,0.18);
    color: #c9b27a;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .qlink:hover {
    background: rgba(212,175,55,0.14);
    border-color: rgba(212,175,55,0.4);
    transform: translateY(-3px);
  }
  .qlink svg { opacity: 0.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="crest">⚜</div>
    <h1>SHALA</h1>
    <div class="sub">Dardania Royal Browser</div>
    <div class="divider"></div>
    <div class="quick-links">
      <a class="qlink" href="https://www.google.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        Google
      </a>
      <a class="qlink" href="https://www.wikipedia.org">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        Wikipedia
      </a>
      <a class="qlink" href="https://github.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.5c0-1 .1-1.4-.5-2 2-.2 4-1 4-4.5 0-1-.5-2-1-2.5.3-1 .3-2-.1-3 0 0-1 0-2.5 1-1.5-.4-3-.4-4.5 0-1.5-1-2.5-1-2.5-1-.4 1-.4 2-.1 3-.5.5-1 1.6-1 2.5 0 3.5 2 4.3 4 4.5-.4.4-.5 1-.5 2V19"/></svg>
        GitHub
      </a>
      <a class="qlink" href="https://shalauberallen.blogspot.com">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        Blog
      </a>
    </div>
  </div>
</body>
</html>
